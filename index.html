<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f4f4f4">
    <title>2048 · 数独</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app">
        <div class="seg seg-mode" id="mode-switch">
            <button type="button" data-mode="g2048" class="active">2048</button>
            <button type="button" data-mode="sudoku">数独</button>
        </div>

        <!-- ===== 2048 ===== -->
        <section id="view-2048" class="view">
            <header class="bar">
                <h1>2048</h1>
                <div class="scores">
                    <div class="score">
                        <span class="score-label">分数</span>
                        <span id="score" class="score-value">0</span>
                    </div>
                    <div class="score">
                        <span class="score-label">最高</span>
                        <span id="best" class="score-value">0</span>
                    </div>
                </div>
            </header>

            <div class="controls">
                <button id="undo-btn" type="button">撤回</button>
                <button id="new-btn" type="button">新游戏</button>
            </div>

            <section id="board" class="board" aria-label="2048 棋盘">
                <div id="grid" class="grid"></div>
                <div id="tiles" class="tiles"></div>
                <div id="overlay" class="overlay hidden">
                    <div id="overlay-text" class="overlay-text"></div>
                    <button id="overlay-btn" type="button"></button>
                </div>
            </section>

            <p class="hint">方向键或滑动屏幕移动方块 · 相同数字合并 · 可随时撤回</p>
        </section>

        <!-- ===== 数独 ===== -->
        <section id="view-sudoku" class="view hidden">
            <div class="seg seg-diff" id="difficulty"></div>

            <div class="controls">
                <button id="sudoku-new" type="button">新游戏</button>
                <button id="sudoku-settings" type="button">设置</button>
            </div>

            <section id="sboard" class="sboard" aria-label="数独棋盘">
                <div id="soverlay" class="overlay hidden">
                    <div id="soverlay-text" class="overlay-text"></div>
                    <button id="soverlay-btn" type="button">再来一题</button>
                </div>
            </section>

            <div class="pad" id="pad"></div>

            <div class="sactions">
                <button id="s-undo" type="button">撤回</button>
                <button id="s-erase" type="button">擦除</button>
                <button id="s-notes" type="button">笔记</button>
            </div>

            <p class="hint">点格子 → 点下方数字键入 · 「笔记」记候选 · 题库来自 Kaggle 3M Sudoku</p>

            <div id="settings" class="settings-modal hidden">
                <div class="settings-panel">
                    <h2 class="settings-title">设置</h2>
                    <label class="setting-row">
                        <span>提示容易锁定的格子</span>
                        <input type="checkbox" id="opt-lock" class="switch">
                    </label>
                    <p class="setting-note">仅一种填法标圆形 · 两种标方形 · 三种标三角</p>
                    <label class="setting-row">
                        <span>以斜体展示提示数</span>
                        <input type="checkbox" id="opt-italic" class="switch">
                    </label>
                    <button id="settings-done" type="button">完成</button>
                </div>
            </div>
        </section>
    </main>

    <script src="puzzles.js"></script>
    <script src="game2048.js"></script>
    <script src="sudoku.js"></script>
    <script src="app.js"></script>
</body>
</html>
